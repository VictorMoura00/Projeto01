services:
  postgres:
    image: postgres:17-alpine
    container_name: admincore_postgres_dev
    environment:
      POSTGRES_DB: admincore_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - admincore_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admincore_dev"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  admincore_postgres_dev:
