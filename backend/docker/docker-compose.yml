services:
  postgres:
    image: postgres:17-alpine
    container_name: admincore_postgres
    environment:
      POSTGRES_DB: admincore_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: admincore_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=admincore;Username=postgres;Password=postgres"
      Jwt__Key: "${JWT_KEY:-CHANGE_ME_IN_PRODUCTION_USE_STRONG_KEY}"
      Jwt__Issuer: "AdminCore"
      Jwt__Audience: "AdminCoreClients"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
